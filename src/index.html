<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS HUD</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' ws://127.0.0.1:8765 http://127.0.0.1:8765 http://127.0.0.1:11434; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; font-src 'self' data:;" />
    <link rel="stylesheet" href="./css/design-system.css" />
    <link rel="stylesheet" href="./css/hud.css" />
  </head>
  <body>
    <div id="hud-root" class="hud-root">
      <header class="hud-panel top-bar">
        <div class="status-pill online">JARVIS ONLINE</div>
        <div id="clock" class="clock">--:--:--</div>
        <div id="backend-status" class="status-pill warn">Backend: starting…</div>
      </header>

      <aside class="hud-panel left-panel">
        <h2>System</h2>
        <div class="gauges-grid">
          <canvas id="cpu-gauge" width="160" height="160"></canvas>
          <canvas id="ram-gauge" width="160" height="160"></canvas>
          <canvas id="gpu-gauge" width="160" height="160"></canvas>
          <canvas id="net-gauge" width="160" height="160"></canvas>
        </div>
      </aside>

      <main class="hud-panel center-panel">
        <canvas id="three-canvas" class="three-canvas"></canvas>
        <div class="orb-wrap">
          <p class="orb-label">JARVIS Core</p>
          <div id="voice-state" class="voice-state">idle</div>
        </div>
      </main>

      <aside class="hud-panel right-panel">
        <h2>Comms</h2>
        <div id="chat-panel" class="chat-panel"></div>
        <div class="chat-input-wrap">
          <input id="chat-input" type="text" placeholder="Message JARVIS…" autocomplete="off" />
          <button id="btn-send" class="hud-btn">Send</button>
        </div>
      </aside>

      <footer class="hud-panel bottom-bar">
        <button id="btn-toggle-clickthrough" class="hud-btn">Toggle Click-through</button>
        <button id="btn-toggle-hud" class="hud-btn">Toggle HUD Visibility</button>
      </footer>
    </div>

    <audio id="tts-audio" autoplay hidden></audio>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
